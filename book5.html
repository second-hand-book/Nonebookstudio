書況:9.99成新

2022 普立茲克獎得主
「富有不代表可以浪費，貧窮也不代表必須放棄品質。」—— Francis Kéré

建築不只是一個最終的物件，而是一段共同參與的過程。在Kéré的眼中，舒適與品質不該是少數人的特權，而是每個人都應享有的尊嚴。他走進社群，用土地最原始的材料，蓋出最溫暖的共鳴。如果你認同富有不代表可以浪費，貧窮不代表放棄品質，Kéré的建築能滿足你對物質與精神平衡的追求。這不是一本關於豪宅的書，而是一本關於每個人都值得擁有舒適的宣言。
